server {
    server_name sahemrelief.org www.sahemrelief.org localhost 127.0.0.1;

    root /root/etelaf-relief-test/public;
    client_max_body_size 25M;
    index index.php index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HTML/PHP: no cache (dynamic)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
        add_header Cache-Control "private, must-revalidate" always;
    }

    # CSS/JS: 1 year cache (content hashed via query string)
    location ~* \.(css|js)$ {
        try_files $uri $uri/ /index.php?$query_string;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Images/Fonts: 1 year cache
    location ~* \.(jpg|jpeg|png|gif|webp|avif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }

    # PHP files
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.5-fpm-test.sock;
    }

    # Deny access to hidden files
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /\.ht {
        deny all;
    }
}


